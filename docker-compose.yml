services:
  db:
    image: postgres:17
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file: .env
    ports:
      - "5444:5432"
    networks:
      - ft_cat-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 1s
      timeout: 1s
      retries: 180

  back:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - ft_cat-network
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .jj
            - .git
            - .direnv

  front:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "1080:80"
    networks:
      - ft_cat-network
    depends_on:
      - back

  redis:
    image: redis:latest
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file: .env
    ports:
      - "6380:6379"
    networks:
      - ft_cat-network
    depends_on:
      - back

networks:
  ft_cat-network:
    driver: bridge