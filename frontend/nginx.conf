


server {
  listen 80;
  server_name localhost;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  location / {
    root      /usr/share/nginx/html;
    index     index.html index.html;
    try_files $uri $uri/ index.html;
  }

  # Reverse proxi creation
  location /api/ {
    proxy_pass http://back:8000; # Redirects API calls to backend container to avoid full links api calls
    proxy_set_header Host $host; # Host name (google.fr for exemple or 127.0.0.1) for localhost
    proxy_set_header X-Real-IP $remote_addr; # Gets client's real IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Gets all routes clients has taken to connect to host
}

  # websockets goes to django
  location /ws/ {
    proxy_pass http://back:8000; # Redirects API calls to backend container to avoid full links api calls
    proxy_set_header Host $host; # Host name (google.fr for exemple or 127.0.0.1) for localhost
    proxy_set_header X-Real-IP $remote_addr; # Gets client's real IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Gets all routes clients has taken to connect to host
}
  # Prevents the browser to do agressive caching by storing
  # cache up to one 1y
  location /assets/ {
    root        /usr/share/nginx/html;
    expires     1y;
    add_header  Cache-Control "public, immutable";
  }

  # REDIRECTS CLIENTS ON PAGE 50x.html IF THERE IS A SERVER ERROR  
  error_page  500 502 503 504 /50x.html;
  location =  /50x.html {
    root      /usr/share/nginx/html;
  }
}